<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Urban Nest Realty — Ask our assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#16202e; --muted:#6b7686; --line:#e3e8ef; --bg:#f4f7fb; --card:#fff; --accent:#1f5fd6; --accent-ink:#17489f; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:"Inter",system-ui,sans-serif; background:var(--bg); color:var(--ink); line-height:1.55; }
  .demobar { background:var(--ink); color:#fff; text-align:center; font-size:13px; padding:7px 14px; }
  .wrap { max-width:560px; margin:0 auto; padding:0 18px; }
  header.site { display:flex; align-items:center; gap:10px; padding:20px 0; }
  .logo { font-weight:700; font-size:19px; color:var(--ink); }
  .logo b { color:var(--accent); }
  .intro { text-align:center; padding:8px 0 18px; }
  .intro h1 { font-size:1.5rem; }
  .intro p { color:var(--muted); font-size:.95rem; margin-top:4px; }
  .chat { background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:0 16px 40px rgba(22,32,46,.07); overflow:hidden; margin-bottom:50px; }
  .chat__head { background:var(--accent); color:#fff; padding:13px 16px; display:flex; align-items:center; gap:10px; }
  .chat__av { width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:15px; }
  .chat__head b { font-size:14px; } .chat__head span { font-size:11px; opacity:.85; display:block; }
  .chat__body { padding:16px; height:380px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
  .b { max-width:82%; padding:9px 13px; border-radius:14px; font-size:14px; }
  .b--bot { background:var(--bg); color:var(--ink); align-self:flex-start; border-bottom-left-radius:4px; }
  .b--me { background:var(--accent); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
  .chips { display:flex; flex-wrap:wrap; gap:7px; padding:0 16px 12px; }
  .chip { font-size:12.5px; border:1px solid var(--accent); color:var(--accent-ink); background:#fff; border-radius:999px; padding:7px 12px; cursor:pointer; transition:.15s; }
  .chip:hover { background:var(--accent); color:#fff; }
  .compose { display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--line); }
  .compose input { flex:1; font:inherit; border:1px solid var(--line); border-radius:999px; padding:10px 14px; }
  .compose input:focus { outline:none; border-color:var(--accent); }
  .compose button { background:var(--accent); color:#fff; border:0; border-radius:999px; padding:0 18px; font:inherit; font-weight:600; cursor:pointer; }
  .typing { font-size:13px; color:var(--muted); align-self:flex-start; padding:4px 2px; }
  footer.site { text-align:center; color:var(--muted); font-size:13px; padding:0 0 40px; }
</style>
</head>
<body>
  <div class="demobar">✦ Sample demo built by YourBrand — illustrative assistant, answers from a small sample knowledge base.</div>
  <div class="wrap">
    <header class="site"><span class="logo">Urban<b>Nest</b> Realty</span></header>
    <div class="intro"><h1>Ask our assistant</h1><p>Answers about listings, viewings and fees — 24/7.</p></div>

    <div class="chat">
      <div class="chat__head"><div class="chat__av">🏡</div><div><b>Nest Assistant</b><span>typically replies instantly</span></div></div>
      <div class="chat__body" id="body"></div>
      <div class="chips" id="chips"></div>
      <form class="compose" id="form"><input id="inp" placeholder="Ask anything…" autocomplete="off" /><button type="submit">Send</button></form>
    </div>

    <footer class="site">Urban Nest Realty · helping you find home since 2011</footer>
  </div>

<script>
(function(){
  var KB=[
    {label:"Homes under ₹80L", keys:["80","under","budget","cheap","price","afford"], a:"I found 6 homes under ₹80L — including a 2BHK on Park Road (₹74L) and a 3BHK in Lakeview (₹79L). Want me to book a viewing or send the full list?", next:["Book a viewing","Send the list"]},
    {label:"Book a viewing", keys:["viewing","visit","see","tour","book"], a:"Sure! I have Saturday 11 AM or Sunday 4 PM. Which suits you?", next:["Saturday 11 AM","Talk to an agent"]},
    {label:"Do you do rentals?", keys:["rent","rental","lease"], a:"Yes — we have rentals from ₹15k/month. Which area are you looking in?", next:["Book a viewing","Talk to an agent"]},
    {label:"What are your fees?", keys:["fee","charge","cost","commission"], a:"For buyers our service is free — we're paid by the seller. Viewings and advice cost you nothing.", next:["Homes under ₹80L","Book a viewing"]},
    {label:"Saturday 11 AM", keys:["saturday","sat 11","11 am"], a:"Booked! 🎉 I'll text you the address and confirmation. Could I get your number?", next:["Talk to an agent"]},
    {label:"Send the list", keys:["list","send","email"], a:"Done — drop your email or WhatsApp number and the full list with photos is on its way.", next:["Talk to an agent"]},
    {label:"Talk to an agent", keys:["agent","human","call","person","speak"], a:"Of course — Anita can call you within the hour. What's the best number to reach you?", next:[]}
  ];
  var body=document.getElementById("body"), chipsEl=document.getElementById("chips");
  function add(text,who){ var d=document.createElement("div"); d.className="b b--"+who; d.textContent=text; body.appendChild(d); body.scrollTop=body.scrollHeight; }
  function chips(arr){ chipsEl.innerHTML=""; arr.forEach(function(l){ var c=document.createElement("button"); c.type="button"; c.className="chip"; c.textContent=l; c.onclick=function(){ ask(l); }; chipsEl.appendChild(c); }); }
  function match(text){ var t=text.toLowerCase(); for(var i=0;i<KB.length;i++){ if(KB[i].label.toLowerCase()===t) return KB[i]; } for(var j=0;j<KB.length;j++){ for(var k=0;k<KB[j].keys.length;k++){ if(t.indexOf(KB[j].keys[k])>-1) return KB[j]; } } return null; }
  function ask(text){
    add(text,"me");
    var hit=match(text);
    var tp=document.createElement("div"); tp.className="typing"; tp.textContent="Nest Assistant is typing…"; body.appendChild(tp); body.scrollTop=body.scrollHeight;
    chipsEl.innerHTML="";
    setTimeout(function(){
      tp.remove();
      if(hit){ add(hit.a,"bot"); chips(hit.next.length?hit.next:["Talk to an agent"]); }
      else { add("Good question — let me connect you with an agent who can help with that. Can I take your number?","bot"); chips(["Talk to an agent","Homes under ₹80L"]); }
    },650);
  }
  var f=document.getElementById("form"), inp=document.getElementById("inp");
  f.addEventListener("submit",function(e){ e.preventDefault(); var v=inp.value.trim(); if(!v)return; inp.value=""; ask(v); });
  // greeting
  add("Hi! 👋 Looking to buy, rent, or just browsing? Ask me anything.","bot");
  chips(["Homes under ₹80L","Book a viewing","Do you do rentals?","What are your fees?"]);
})();
</script>
</body>
</html>
